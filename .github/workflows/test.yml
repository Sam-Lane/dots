name: Install test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-ubuntu:
    name: Ubuntu (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build test image
        run: docker build -f tests/Dockerfile -t dots-test .

      - name: Run install + assertions
        run: docker run --rm dots-test
